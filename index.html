<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>vCard QR - TQ PRO MAX</title>

    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;background:#f2f4f8;color:#333;}

        /* ESTRUCTURA DASHBOARD */
        .header{background:white;padding:20px;display:flex;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        .logo{height:100px;}
        .hero{background:linear-gradient(135deg,#0a3d91,#1e66d0);color:white;text-align:center;padding:30px;}

        .container{max-width:1200px;margin:30px auto;background:white;border-radius:15px;padding:25px;box-shadow:0 15px 40px rgba(0,0,0,0.08);}
        .main-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:40px;}

        /* FORMULARIO */
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        input, select{padding:12px;border-radius:8px;border:1px solid #ddd; width: 100%; font-size: 14px;}
        button{margin-top:10px;padding:12px;border:none;border-radius:10px;background:#1e66d0;color:white;cursor:pointer;font-weight:600;}

        /* VISTA PREVIA (MODO EDICIÓN) */
        .preview-container { display: flex; justify-content: center; align-items: flex-start; }
        .phone{width:320px; min-height:620px; background:black; border-radius:45px; padding:12px; position:relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2);}
        .phone::before{content:"";width:120px;height:25px;background:black;position:absolute;top:0;left:50%;transform:translateX(-50%);border-bottom-left-radius:15px;border-bottom-right-radius:15px;z-index:20;}

        .screen{width:100%;height:100%;background:#ffffff;border-radius:35px;overflow:hidden;display: flex; flex-direction: column; min-height: 596px;}
        .screen-content {flex: 1; overflow-y: auto;}

        /* DISEÑO DE LA TARJETA (TAMAÑO DE LETRA AUMENTADO) */
        .card-header{background: linear-gradient(135deg,#0a3d91,#1e66d0); color:white; text-align:center; padding:45px 20px; position:relative;}
        .card-header img{width:130px; height:130px; border-radius:50%; border:5px solid white; object-fit:cover; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .card-header h2{font-size:24px; font-weight:600; line-height: 1.2; margin-bottom: 5px;}
        .card-header .cargo{font-size:16px; opacity:0.9; font-weight: 300;}
        .card-header .empresa{font-size:18px; font-weight: 500; margin-top: 5px;}

        .card-body{margin-top:-25px; background:white; border-radius:25px 25px 0 0; padding:25px 20px; position: relative; z-index: 5;}
        .card-body p{margin:15px 0; display:flex; align-items:center; gap:12px; border-bottom:1px solid #eee; padding-bottom:10px; font-size:15px; color: #2c3e50;}
        .card-body p strong { display: none; } /* Iconos ya dan el contexto */

        .contact-footer {padding: 20px; background: white; border-top: 1px solid #eee;}
        .contact-btn{display:block; width:100%; padding:18px; border-radius:15px; background: linear-gradient(135deg,#1e66d0,#0a3d91); color:white; text-align:center; font-weight:600; text-decoration:none; font-size: 16px; box-shadow: 0 4px 12px rgba(30,102,208,0.4);}

        /* QR AREA */
        .qr-area{text-align:center; margin-top:25px; background:#f8f9fa; padding:20px; border-radius:12px;}
        #qr { display: flex; justify-content: center; margin: 15px 0; }

        /* MODO PANTALLA COMPLETA (AL ESCANEAR) */
        body.view-mode { background: #ffffff; }
        body.view-mode .header, body.view-mode .hero, body.view-mode #formSection { display: none !important; }
        body.view-mode .container { max-width: 100%; margin: 0; padding: 0; box-shadow: none; }
        body.view-mode .main-grid { display: block; }
        body.view-mode .phone { width: 100%; min-height: 100vh; border-radius: 0; padding: 0; box-shadow: none; }
        body.view-mode .phone::before { display: none; }
        body.view-mode .screen { border-radius: 0; min-height: 100vh; }
        body.view-mode .card-header { padding: 60px 20px; }
        body.view-mode .card-header h2 { font-size: 28px; }
    </style>
</head>

<body>

<div class="header">
    <img src="tq-logo-2024.png" class="logo" alt="Logo">
</div>

<div class="hero">
    <h1>Mi Tarjeta Digital TQ</h1>
    <p>Completa tus datos y genera tu código QR</p>
</div>

<div class="container">
    <div class="main-grid">
        
        <div id="formSection">
            <h3 style="margin-bottom:15px; color:#0a3d91;">Información Personal</h3>
            <div class="form-grid">
                <input id="nombre" placeholder="Nombre">
                <input id="apellidos" placeholder="Apellidos">
                <input id="empresa" placeholder="Empresa">
                <input id="cargo" placeholder="Cargo">
                <input id="telefono_ext" placeholder="Teléfono + Ext">
                <input id="telefono" placeholder="Teléfono fijo">
                <input id="celular" placeholder="Celular">
                <input id="correo" placeholder="Correo electrónico">
                <input id="direccion" placeholder="Dirección">
                <input id="web" placeholder="Sitio Web (ej: www.tq.com)">
            </div>

            <div style="margin-top:20px;">
                <label style="font-weight:500; display:block; margin-bottom:5px;">Foto de Perfil:</label>
                <input type="file" id="foto" accept="image/*">
            </div>

            <div class="qr-area">
                <button id="btnQR" style="width:100%; background:#0a3d91; font-size:16px;">GENERAR QR DE MI TARJETA</button>
                <div id="qr"></div>
                <button onclick="window.print()" style="background:#666; font-size:13px;">Imprimir / Guardar PDF</button>
            </div>
        </div>

        <div class="preview-container">
            <div class="phone">
                <div class="screen">
                    <div class="screen-content">
                        <div class="card-header">
                            <img id="cardFoto" src="https://via.placeholder.com/150" style="display:none;">
                            <h2 id="cardNombre">Nombre Apellido</h2>
                            <p id="cardCargo" class="cargo">Cargo</p>
                            <p id="cardEmpresa" class="empresa">Empresa</p>
                        </div>
                        <div class="card-body">
                            <p id="cardTelExt"><span>📞</span> -</p>
                            <p id="cardTelefono"><span>☎</span> -</p>
                            <p id="cardCelular"><span>📱</span> -</p>
                            <p id="cardCorreo"><span>✉</span> -</p>
                            <p id="cardDireccion"><span>📍</span> -</p>
                            <p id="cardWeb"><span>🌐</span> -</p>
                        </div>
                    </div>
                    <div class="contact-footer">
                        <a id="btnContacto" class="contact-btn">AGREGAR A CONTACTOS</a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
const fieldIds = ["nombre","apellidos","empresa","cargo","telefono","celular","correo","telefono_ext","direccion","web"];
let fotoBase64 = "";

// 1. PROCESAR FOTO (Y CONVERTIR A BASE64 PARA EL QR)
document.getElementById('foto').addEventListener("change", e => {
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = evt => {
            fotoBase64 = evt.target.result;
            const img = document.getElementById('cardFoto');
            img.src = fotoBase64;
            img.style.display = "inline-block";
        };
        reader.readAsDataURL(file);
    }
});

// 2. ACTUALIZACIÓN DE VISTA
function actualizarVista() {
    const getVal = (id) => document.getElementById(id).value;
    
    document.getElementById('cardNombre').innerText = (getVal('nombre') + " " + getVal('apellidos')).trim() || "Nombre Apellido";
    document.getElementById('cardCargo').innerText = getVal('cargo') || "Cargo";
    document.getElementById('cardEmpresa').innerText = getVal('empresa') || "Empresa";
    document.getElementById('cardTelefono').innerText = "☎ " + (getVal('telefono') || "-");
    document.getElementById('cardCelular').innerText = "📱 " + (getVal('celular') || "-");
    document.getElementById('cardCorreo').innerText = "✉ " + (getVal('correo') || "-");
    document.getElementById('cardTelExt').innerText = "📞 " + (getVal('telefono_ext') || "-");
    document.getElementById('cardDireccion').innerText = "📍 " + (getVal('direccion') || "-");
    document.getElementById('cardWeb').innerText = "🌐 " + (getVal('web') || "-");
    
    generarVCF();
}

fieldIds.forEach(id => document.getElementById(id).addEventListener("input", actualizarVista));

// 3. BOTÓN CONTACTO (VCF)
function generarVCF() {
    const getVal = (id) => document.getElementById(id).value;
    const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${getVal('nombre')} ${getVal('apellidos')}\nORG:${getVal('empresa')}\nTITLE:${getVal('cargo')}\nTEL;TYPE=WORK:${getVal('telefono_ext')}\nTEL;TYPE=HOME:${getVal('telefono')}\nTEL;TYPE=CELL:${getVal('celular')}\nEMAIL:${getVal('correo')}\nADR:${getVal('direccion')}\nURL:${getVal('web')}\nEND:VCARD`;
    const blob = new Blob([vcard], { type: "text/vcard" });
    const btn = document.getElementById('btnContacto');
    if(btn.href) URL.revokeObjectURL(btn.href);
    btn.href = URL.createObjectURL(blob);
    btn.download = (getVal('nombre') || "contacto") + ".vcf";
}

// 4. GENERAR QR (INCLUYENDO LA FOTO EN LA URL)
document.getElementById('btnQR').onclick = () => {
    const params = new URLSearchParams();
    fieldIds.forEach(id => {
        const val = document.getElementById(id).value;
        if(val) params.append(id, val);
    });
    
    // Nota: Si la foto es muy pesada, el QR será muy denso. 
    // Se recomienda usar fotos pequeñas (menos de 50kb).
    if(fotoBase64) params.append("img", "1"); 

    const finalUrl = window.location.origin + window.location.pathname + "?" + params.toString();
    
    document.getElementById('qr').innerHTML = "";
    const qrCode = new QRCodeStyling({
        width: 250,
        height: 250,
        data: finalUrl,
        dotsOptions: { color: "#0a3d91", type: "rounded" },
        backgroundOptions: { color: "#ffffff" }
    });
    qrCode.append(document.getElementById('qr'));
};

// 5. CARGAR DESDE URL (MODO ESCANEO)
window.addEventListener('load', () => {
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('nombre') || urlParams.has('celular')) {
        document.body.classList.add('view-mode');
        fieldIds.forEach(id => {
            if(urlParams.has(id)) document.getElementById(id).value = urlParams.get(id);
        });
        
        // Si el QR viene de una sesión local, intentamos mostrar la foto si existe en el cache
        // (Nota: Las URLs tienen límite de caracteres, por seguridad no enviamos el base64 completo en el QR 
        // a menos que sea una URL externa de imagen).
        actualizarVista();
    }
});
</script>

</body>
</html>
