<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>vCard QR - TQ PRO MAX</title>

<script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f2f4f8;}

/* HEADER */
.header{background:white;padding:20px;display:flex;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.logo{height:120px;}

/* HERO */
.hero{background:linear-gradient(135deg,#0a3d91,#1e66d0);color:white;text-align:center;padding:40px;}

/* CONTENEDOR */
.container{max-width:1200px;margin:40px auto;background:white;border-radius:15px;padding:25px;box-shadow:0 15px 40px rgba(0,0,0,0.08);}

/* GRID */
.main-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:30px;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input, select{padding:10px;border-radius:8px;border:1px solid #ddd;}
button{margin-top:10px;padding:10px;border:none;border-radius:10px;background:#1e66d0;color:white;cursor:pointer;}

/* IPHONE */
.phone{width:290px;height:600px;background:black;border-radius:40px;padding:10px;margin:auto;position:relative;}
.phone::before{content:"";width:100px;height:20px;background:black;position:absolute;top:0;left:50%;transform:translateX(-50%);border-bottom-left-radius:15px;border-bottom-right-radius:15px;z-index:10;}
.screen{width:100%;height:100%;background:#ffffff;border-radius:30px;overflow-y:auto;overflow-x:hidden;}

/* TARJETA TQ MEJORADA */
.card-header{
    background: linear-gradient(135deg,#0a3d91,#1e66d0);
    color:white;text-align:center;padding:30px 20px 50px;position:relative;
}
.card-header img{
    width:110px;height:110px;border-radius:50%;border:4px solid white;object-fit:cover;box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
.card-header h2{margin-top:10px;font-size:20px;font-weight:500;}
.card-header p{font-size:13px;opacity:0.9;}

/* BODY TIPO GLASS */
.card-body{
    margin-top:-30px;background:white;border-radius:20px 20px 0 0;padding:20px;font-size:13px;box-shadow:0 -5px 20px rgba(0,0,0,0.05);
}
.card-body p{margin:10px 0;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f2f2f2;padding-bottom:6px;}

/* BOTÓN CONTACTO */
.contact-btn{
    display:block;width:85%;margin:20px auto;padding:13px;border-radius:14px;
    background: linear-gradient(135deg,#1e66d0,#0a3d91);
    color:white;text-align:center;font-weight:500;text-decoration:none;
    box-shadow:0 6px 15px rgba(30,102,208,0.3);transition:0.2s;
}
.contact-btn:hover{transform:scale(1.03);}

/* QR */
.qr-container{text-align:center;margin-top:20px;}
.export-container{position:relative;display:inline-block;}
.export-menu{display:none;position:absolute;background:white;border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,0.1);width:120px;z-index:100;bottom: 100%;}
.export-menu button{width:100%;background:white;color:black;margin-top:0;border-radius:0;border-bottom:1px solid #eee;}

/* MODO VISUALIZACIÓN (Cuando se escanea el QR) */
body.view-mode .hero, 
body.view-mode #formSection {display:none;}
body.view-mode .main-grid {grid-template-columns: 1fr;}
body.view-mode .container {max-width: 500px; background: transparent; box-shadow: none; margin-top: 20px;}
</style>
</head>

<body>

<div class="header">
    <img src="tq-logo-2024.png" class="logo">
</div>

<div class="hero">
    <h1>Generador de vCard con QR</h1>
</div>

<div class="container">
<div class="main-grid">

<div id="formSection">
    <input type="file" id="foto">
    <div class="form-grid">
        <input id="nombre" placeholder="Nombre">
        <input id="apellidos" placeholder="Apellidos">
        <input id="empresa" placeholder="Empresa">
        <input id="cargo" placeholder="Cargo">
        <input id="telefono_ext" placeholder="Teléfono + Ext">
        <input id="telefono" placeholder="Teléfono fijo">
        <input id="celular" placeholder="Celular">
        <input id="correo" placeholder="Correo">
        <input id="direccion" placeholder="Dirección">
        <input id="web" placeholder="Web">
    </div>

    <div style="margin-top:15px;">
        <label>Color QR:</label>
        <input type="color" id="colorQR" value="#1e66d0">
        <label>Diseño QR:</label>
        <select id="estiloQR">
            <option value="rounded">Redondeado</option>
            <option value="dots">Puntos</option>
            <option value="square">Cuadrado</option>
            <option value="extra-rounded">Extra redondeado</option>
            <option value="classy">Elegante</option>
            <option value="classy-rounded">Elegante redondeado</option>
        </select>
    </div>

    <button id="btnQR" style="width:100%; font-weight:bold;">GENERAR QR PARA MI TARJETA</button>

    <div class="qr-container">
        <div id="qr"></div>
        <div class="export-container" id="exportArea" style="display:none; margin-top:10px;">
            <button onclick="toggleMenu()">Exportar QR ⬇</button>
            <div id="menuExport" class="export-menu">
                <button onclick="descargarPNG()">PNG</button>
                <button onclick="descargarJPG()">JPEG</button>
                <button onclick="descargarPDF()">PDF</button>
            </div>
        </div>
    </div>
</div>

<div>
    <div class="phone">
        <div class="screen">
            <div class="card-header">
                <img id="cardFoto" src="" alt="" style="display:none;">
                <h2 id="cardNombre">Nombre</h2>
                <p id="cardCargo">Cargo</p>
                <p id="cardEmpresa">Empresa</p>
            </div>

            <div class="card-body">
                <p id="cardTelExt">📞 -</p>
                <p id="cardTelefono">☎ -</p>
                <p id="cardCelular">📱 -</p>
                <p id="cardCorreo">✉ -</p>
                <p id="cardDireccion">📍 -</p>
                <p id="cardWeb">🌐 -</p>
            </div>

            <a id="btnContacto" class="contact-btn">Agregar a contactos</a>
        </div>
    </div>
</div>

</div>
</div>

<script>
let qrCode;
const fieldIds = ["nombre","apellidos","empresa","cargo","telefono","celular","correo","telefono_ext","direccion","web"];

// Manejo de la foto
document.getElementById('foto').addEventListener("change", e => {
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = evt => {
            const img = document.getElementById('cardFoto');
            img.src = evt.target.result;
            img.style.display = "inline-block";
        };
        reader.readAsDataURL(file);
    }
});

// Actualización en tiempo real de la vista previa [cite: 7, 8, 9, 10]
fieldIds.forEach(id => {
    document.getElementById(id).addEventListener("input", actualizarVista);
});

function actualizarVista() {
    const val = (id) => document.getElementById(id).value;

    document.getElementById('cardNombre').innerText = (val('nombre') + " " + val('apellidos')).trim() || "Nombre";
    document.getElementById('cardCargo').innerText = val('cargo') || "Cargo";
    document.getElementById('cardEmpresa').innerText = val('empresa') || "Empresa";
    document.getElementById('cardTelefono').innerText = "☎ " + (val('telefono') || "-");
    document.getElementById('cardCelular').innerText = "📱 " + (val('celular') || "-");
    document.getElementById('cardCorreo').innerText = "✉ " + (val('correo') || "-");
    document.getElementById('cardTelExt').innerText = "📞 " + (val('telefono_ext') || "-");
    document.getElementById('cardDireccion').innerText = "📍 " + (val('direccion') || "-");
    document.getElementById('cardWeb').innerText = "🌐 " + (val('web') || "-");
    
    generarArchivoVCF();
}

// Crea el archivo .vcf para el botón "Agregar a contactos" [cite: 10, 12]
function generarArchivoVCF() {
    const val = (id) => document.getElementById(id).value;
    
    let vcard = `BEGIN:VCARD
VERSION:3.0
N:${val('apellidos')};${val('nombre')}
FN:${val('nombre')} ${val('apellidos')}
ORG:${val('empresa')}
TITLE:${val('cargo')}
TEL;TYPE=WORK:${val('telefono_ext')}
TEL;TYPE=HOME:${val('telefono')}
TEL;TYPE=CELL:${val('celular')}
EMAIL:${val('correo')}
ADR:${val('direccion')}
URL:${val('web')}
END:VCARD`;

    const blob = new Blob([vcard], { type: "text/vcard" });
    const url = URL.createObjectURL(blob);
    const btn = document.getElementById('btnContacto');
    btn.href = url;
    btn.download = (val('nombre') || "contacto") + ".vcf";
}

// Generación del QR [cite: 11, 12]
document.getElementById('btnQR').onclick = () => {
    const params = new URLSearchParams();
    fieldIds.forEach(id => {
        const value = document.getElementById(id).value;
        if(value) params.append(id, value);
    });

    // Construye la URL que se guardará en el QR (tu página actual + datos)
    const baseUrl = window.location.origin + window.location.pathname;
    const finalUrl = baseUrl + "?" + params.toString();

    document.getElementById('qr').innerHTML = "";
    qrCode = new QRCodeStyling({
        width: 250,
        height: 250,
        data: finalUrl,
        dotsOptions: {
            color: document.getElementById('colorQR').value,
            type: document.getElementById('estiloQR').value
        },
        backgroundOptions: { color: "#ffffff" }
    });
    
    qrCode.append(document.getElementById('qr'));
    document.getElementById('exportArea').style.display = 'inline-block';
};

// Lógica de detección al cargar (Modo Visualización)
window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('nombre') || urlParams.has('celular')) {
        // Activa el modo donde solo se ve la tarjeta
        document.body.classList.add('view-mode');
        
        fieldIds.forEach(id => {
            if(urlParams.has(id)) {
                document.getElementById(id).value = urlParams.get(id);
            }
        });
        actualizarVista();
    }
};

// Funciones de Exportación [cite: 13, 14, 15]
function toggleMenu(){
    const menu = document.getElementById('menuExport');
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}
function descargarPNG(){ qrCode.download({ name:"QR_Contacto", extension:"png" }); }
function descargarJPG(){ qrCode.download({ name:"QR_Contacto", extension:"jpeg" }); }
function descargarPDF(){
    const canvas = document.querySelector("#qr canvas");
    if(!canvas) return;
    const imgData = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    pdf.addImage(imgData, 'PNG', 50, 50, 100, 100);
    pdf.save("QR_Contacto.pdf");
}
</script>

</body>
</html>
