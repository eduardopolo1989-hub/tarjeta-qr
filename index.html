<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vCard QR - TQ PRO MAX</title>

<script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f2f4f8;}

/* HEADER */
.header{background:white;padding:20px;display:flex;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.logo{height:120px;}

/* HERO */
.hero{background:linear-gradient(135deg,#0a3d91,#1e66d0);color:white;text-align:center;padding:40px;}

/* CONTENEDOR */
.container{max-width:1200px;margin:40px auto;background:white;border-radius:15px;padding:25px;box-shadow:0 15px 40px rgba(0,0,0,0.08);}

/* GRID */
.main-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:30px;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input, select{padding:10px;border-radius:8px;border:1px solid #ddd;}
button{margin-top:10px;padding:10px;border:none;border-radius:10px;background:#1e66d0;color:white;cursor:pointer;}

/* IPHONE */
.phone{width:290px;height:600px;background:black;border-radius:40px;padding:10px;margin:auto;}
.screen{width:100%;height:100%;background:#ffffff;border-radius:30px;overflow:hidden;}

/* TARJETA */
.card-header{
    background: linear-gradient(135deg,#0a3d91,#1e66d0);
    color:white;text-align:center;padding:30px 20px 50px;position:relative;
}
.card-header img{
    width:110px;height:110px;border-radius:50%;border:4px solid white;object-fit:cover;
}
.card-header h2{margin-top:10px;font-size:20px;}
.card-body{
    margin-top:-30px;background:white;border-radius:20px 20px 0 0;padding:20px;font-size:13px;
}
.card-body p{margin:10px 0;}

.contact-btn{
    display:block;width:85%;margin:20px auto;padding:13px;border-radius:14px;
    background: linear-gradient(135deg,#1e66d0,#0a3d91);
    color:white;text-align:center;text-decoration:none;
}

/* QR */
.qr-container{text-align:center;margin-top:20px;}
</style>
</head>

<body>

<div class="header">
    <img src="img/tq-logo-2024.png" class="logo">
</div>

<div class="hero">
    <h1>Generador de vCard con QR</h1>
</div>

<div class="container">

<div class="main-grid">

<!-- FORM -->
<div>
<input type="file" id="foto">
<div class="form-grid">
<input id="nombre" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="empresa" placeholder="Empresa">
<input id="cargo" placeholder="Cargo">
<input id="celular" placeholder="Celular">
<input id="correo" placeholder="Correo">
</div>

<button id="btnQR">Generar QR</button>

<div class="qr-container">
<div id="qr"></div>
</div>
</div>

<!-- PREVIEW -->
<div>
<div class="phone">
<div class="screen">

<div class="card-header">
<img id="cardFoto">
<h2 id="cardNombre">Nombre</h2>
<p id="cardCargo">Cargo</p>
<p id="cardEmpresa">Empresa</p>
</div>

<div class="card-body">
<p id="cardCelular">📱 -</p>
<p id="cardCorreo">✉ -</p>
</div>

<a id="btnContacto" class="contact-btn">Agregar a contactos</a>

</div>
</div>
</div>

</div>
</div>

<script>
let qrCode;

/* =========================
   MODO QR (SOLO TARJETA)
========================= */
const params = new URLSearchParams(window.location.search);
if(params.get("qr") === "1"){
    document.querySelector(".header").style.display = "none";
    document.querySelector(".hero").style.display = "none";
    document.querySelector(".container > .main-grid > div:first-child").style.display = "none";
}

/* =========================
   CARGAR DATOS DESDE URL
========================= */
if(params.get("n")){
    let nombreVal = params.get("n");
    let apellidoVal = params.get("a");
    let cargoVal = params.get("c");
    let empresaVal = params.get("e");
    let celVal = params.get("cel");
    let mailVal = params.get("mail");

    cardNombre.innerText = nombreVal + " " + apellidoVal;
    cardCargo.innerText = cargoVal;
    cardEmpresa.innerText = empresaVal;
    cardCelular.innerText = "📱 " + celVal;
    cardCorreo.innerText = "✉ " + mailVal;

    let vcard = `BEGIN:VCARD
VERSION:3.0
N:${apellidoVal};${nombreVal}
FN:${nombreVal} ${apellidoVal}
ORG:${empresaVal}
TITLE:${cargoVal}
TEL;TYPE=CELL:${celVal}
EMAIL:${mailVal}
END:VCARD`;

    const blob = new Blob([vcard], { type: "text/vcard" });
    const url = URL.createObjectURL(blob);
    btnContacto.href = url;
    btnContacto.download = "contacto.vcf";
}

/* =========================
   GENERAR QR
========================= */
btnQR.onclick = ()=>{

    let urlQR = `https://TUUSUARIO.github.io/tarjeta-qr/?qr=1
&n=${encodeURIComponent(nombre.value)}
&a=${encodeURIComponent(apellidos.value)}
&c=${encodeURIComponent(cargo.value)}
&e=${encodeURIComponent(empresa.value)}
&cel=${encodeURIComponent(celular.value)}
&mail=${encodeURIComponent(correo.value)}`;

    qr.innerHTML="";

    qrCode = new QRCodeStyling({
        width:250,
        height:250,
        data:urlQR,
        dotsOptions:{color:"#1e66d0",type:"rounded"}
    });

    qrCode.append(qr);
};
</script>

</body>
</html>
