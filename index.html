<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>vCard QR - TQ PRO MAX</title>

<script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f2f4f8; overflow-x: hidden;}

/* UI GENERAL */
.header{background:white;padding:20px;display:flex;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.logo{height:80px;}
.hero{background:linear-gradient(135deg,#0a3d91,#1e66d0);color:white;text-align:center;padding:30px;}
.container{max-width:1200px;margin:20px auto;background:white;border-radius:15px;padding:25px;box-shadow:0 15px 40px rgba(0,0,0,0.08);}
.main-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:30px;}

/* FORMULARIO */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input{padding:10px;border-radius:8px;border:1px solid #ddd; width: 100%; font-family: inherit;}
button{margin-top:10px;padding:12px;border:none;border-radius:10px;background:#1e66d0;color:white;cursor:pointer; font-weight: bold; width: 100%;}

/* TARJETA / PHONE */
.phone{width:320px; height:580px; background:black; border-radius:40px; padding:12px; margin:auto; position:relative;}
.phone::before{content:""; width:100px; height:18px; background:black; position:absolute; top:0; left:50%; transform:translateX(-50%); border-bottom-left-radius:15px; border-bottom-right-radius:15px; z-index:20;}
.screen{width:100%; height:100%; background:#ffffff; border-radius:28px; overflow:hidden; display: flex; flex-direction: column;}
.screen-content { flex: 1; overflow-y: auto; scrollbar-width: none; }

/* DISEÑO CARD */
.card-header{background: linear-gradient(135deg,#0a3d91,#1e66d0); color:white; text-align:center; padding:40px 20px;}
.card-header img{width:110px; height:110px; border-radius:50%; border:4px solid white; object-fit:cover; margin-bottom: 10px;}
.card-body{margin-top:-20px; background:white; border-radius:25px 25px 0 0; padding:25px; font-size:14px;}
.card-body p{margin:12px 0; display:flex; align-items:center; gap:10px; border-bottom:1px solid #f0f0f0; padding-bottom:8px;}

.contact-footer { padding: 15px; background: white; border-top: 1px solid #eee; }
.contact-btn{display:block; width:100%; padding:15px; border-radius:12px; background: #1e66d0; color:white; text-align:center; font-weight:600; text-decoration:none;}

/* MODO VISUALIZACIÓN (FULL SCREEN) */
body.view-mode .header, body.view-mode .hero, body.view-mode #formSection { display: none !important; }
body.view-mode .container { max-width: 100%; margin: 0; padding: 0; box-shadow: none; border-radius: 0; }
body.view-mode .main-grid { grid-template-columns: 1fr; }
body.view-mode .phone { width: 100vw; height: 100vh; border-radius: 0; padding: 0; }
body.view-mode .phone::before { display: none; }
body.view-mode .screen { border-radius: 0; }

@media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }
</style>
</head>

<body>

<div class="header"><img src="tq-logo-2024.png" class="logo"></div>
<div class="hero"><h1>Generador vCard</h1></div>

<div class="container">
    <div class="main-grid">
        <div id="formSection">
            <label>Foto de Perfil:</label>
            <input type="file" id="foto" accept="image/*" style="margin-bottom:15px;">
            <div class="form-grid">
                <input id="nombre" placeholder="Nombre">
                <input id="apellidos" placeholder="Apellidos">
                <input id="empresa" placeholder="Empresa">
                <input id="cargo" placeholder="Cargo">
                <input id="telefono_ext" placeholder="Teléfono + Ext">
                <input id="celular" placeholder="Celular">
                <input id="correo" placeholder="Correo">
                <input id="web" placeholder="Web">
            </div>
            <button id="btnQR">GENERAR QR CON FOTO</button>
            <div id="qr" style="text-align:center; margin-top:20px;"></div>
        </div>

        <div id="cardSection">
            <div class="phone">
                <div class="screen">
                    <div class="screen-content">
                        <div class="card-header">
                            <img id="cardFoto" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                            <h2 id="cardNombre">Nombre Apellido</h2>
                            <p id="cardCargo">Cargo</p>
                        </div>
                        <div class="card-body">
                            <p id="cardCel">📱 <span>-</span></p>
                            <p id="cardEmail">✉ <span>-</span></p>
                            <p id="cardOrg">🏢 <span>-</span></p>
                            <p id="cardW">🌐 <span>-</span></p>
                        </div>
                    </div>
                    <div class="contact-footer">
                        <a id="btnContacto" class="contact-btn">Guardar Contacto</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let fotoMiniBase64 = "";
const fieldIds = ["nombre","apellidos","empresa","cargo","telefono_ext","celular","correo","web"];

// Procesar foto al subirla
document.getElementById('foto').onchange = function(e) {
    const reader = new FileReader();
    reader.onload = function(event) {
        document.getElementById('cardFoto').src = event.target.result;
        
        // Crear miniatura para el QR (para que no pese y el QR se genere)
        const img = new Image();
        img.onload = function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 40; // Tamaño pequeño para el QR
            canvas.height = 40;
            ctx.drawImage(img, 0, 0, 40, 40);
            fotoMiniBase64 = canvas.toDataURL('image/jpeg', 0.3).split(',')[1];
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

// Actualizar vista previa
function actualizar() {
    const val = (id) => document.getElementById(id).value;
    document.getElementById('cardNombre').innerText = val('nombre') + " " + val('apellidos');
    document.getElementById('cardCargo').innerText = val('cargo');
    document.querySelector('#cardCel span').innerText = val('celular');
    document.querySelector('#cardEmail span').innerText = val('correo');
    document.querySelector('#cardOrg span').innerText = val('empresa');
    document.querySelector('#cardW span').innerText = val('web');

    // Generar archivo VCF (aquí sí va la foto original)
    let vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${val('nombre')} ${val('apellidos')}\nTEL:${val('celular')}\nEMAIL:${val('correo')}\nORG:${val('empresa')}\nTITLE:${val('cargo')}`;
    const fotoCompleta = document.getElementById('cardFoto').src;
    if(fotoCompleta.includes('base64')) vcf += `\nPHOTO;ENCODING=b;TYPE=JPEG:${fotoCompleta.split(',')[1]}`;
    vcf += `\nEND:VCARD`;
    
    const blob = new Blob([vcf], {type: 'text/vcard'});
    document.getElementById('btnContacto').href = URL.createObjectURL(blob);
    document.getElementById('btnContacto').download = "contacto.vcf";
}

fieldIds.forEach(id => document.getElementById(id).oninput = actualizar);

// Generar QR
document.getElementById('btnQR').onclick = function() {
    const params = new URLSearchParams();
    fieldIds.forEach(id => {
        if(document.getElementById(id).value) params.append(id, document.getElementById(id).value);
    });
    if(fotoMiniBase64) params.append('f', fotoMiniBase64);

    const url = window.location.origin + window.location.pathname + "?" + params.toString();
    
    document.getElementById('qr').innerHTML = "";
    new QRCodeStyling({
        width: 250, height: 250, data: url,
        dotsOptions: { color: "#0a3d91", type: "rounded" },
        qrOptions: { errorCorrectionLevel: 'L' } // Nivel bajo para permitir URLs largas
    }).append(document.getElementById('qr'));
};

// Al cargar (Modo Escaneo)
window.onload = function() {
    const p = new URLSearchParams(window.location.search);
    if(p.has('nombre')) {
        document.body.classList.add('view-mode');
        fieldIds.forEach(id => { if(p.has(id)) document.getElementById(id).value = p.get(id); });
        if(p.has('f')) document.getElementById('cardFoto').src = "data:image/jpeg;base64," + p.get('f');
        actualizar();
    }
};
</script>
</body>
</html>
