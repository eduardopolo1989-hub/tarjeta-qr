<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>vCard QR - TQ PRO MAX</title>

<script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f2f4f8; min-height: 100vh;}

/* --- ELEMENTOS DEL GENERADOR (Se ocultan al escanear) --- */
.header{background:white;padding:20px;display:flex;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.logo{height:120px;}
.hero{background:linear-gradient(135deg,#0a3d91,#1e66d0);color:white;text-align:center;padding:40px;}
.container{max-width:1200px;margin:40px auto;background:white;border-radius:15px;padding:25px;box-shadow:0 15px 40px rgba(0,0,0,0.08);}
.main-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:30px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input, select{padding:10px;border-radius:8px;border:1px solid #ddd; width: 100%; font-family: inherit;}
button{margin-top:10px;padding:12px;border:none;border-radius:10px;background:#1e66d0;color:white;cursor:pointer;font-weight: bold;}

/* --- ESTRUCTURA DE LA TARJETA --- */
.phone-container { display: flex; justify-content: center; }

/* El marco negro del iPhone */
.phone {
    width:320px; height:640px; background:black; border-radius:45px; 
    padding:12px; position:relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}
/* La muesca (notch) del iPhone */
.phone::before {
    content:""; width:120px; height:25px; background:black; position:absolute; 
    top:0; left:50%; transform:translateX(-50%); border-bottom-left-radius:18px; 
    border-bottom-right-radius:18px; z-index:20;
}

/* Pantalla interna */
.screen {
    width:100%; height:100%; background:#ffffff; border-radius:35px; 
    overflow:hidden; display: flex; flex-direction: column; position: relative;
}

.screen-content { flex: 1; overflow-y: auto; scrollbar-width: none; }
.screen-content::-webkit-scrollbar { display: none; }

/* DISEÑO VISUAL TARJETA */
.card-header {
    background: linear-gradient(135deg,#0a3d91,#1e66d0);
    color:white; text-align:center; padding:50px 20px 45px; position:relative;
}
.card-header img {
    width:110px; height:110px; border-radius:50%; border:4px solid white; 
    object-fit:cover; box-shadow:0 8px 20px rgba(0,0,0,0.2); margin-bottom: 12px;
}
.card-header h2 { font-size:20px; font-weight:500; margin-bottom: 5px; }
.card-header p { font-size:14px; opacity:0.9; }

.card-body {
    margin-top:-25px; background:white; border-radius:25px 25px 0 0; 
    padding:30px 20px; position: relative; z-index: 5;
}
.card-body p {
    margin-bottom:15px; display:flex; align-items:center; gap:12px; 
    border-bottom:1px solid #f2f2f2; padding-bottom:10px; color: #333; font-size: 14px;
}

/* BOTÓN AGREGAR FIJO */
.contact-footer { padding: 20px; background: white; border-top: 1px solid #eee; }
.contact-btn {
    display:block; width:100%; padding:16px; border-radius:16px;
    background: linear-gradient(135deg,#1e66d0,#0a3d91);
    color:white; text-align:center; font-weight:600; text-decoration:none;
    box-shadow:0 6px 15px rgba(30,102,208,0.3);
}

/* ---------------------------------------------------
   MODO VISUALIZACIÓN (AL ESCANEAR EL QR)
------------------------------------------------------ */
body.view-mode { background: white; overflow: hidden; }

/* Ocultar todo lo que no sea la tarjeta */
body.view-mode .header, 
body.view-mode .hero, 
body.view-mode #formSection,
body.view-mode .container { display: none !important; }

/* Forzar la tarjeta a ocupar toda la pantalla sin marcos */
body.view-mode .phone-container {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999;
}
body.view-mode .phone {
    width: 100% !important; height: 100% !important; 
    max-width: none !important; max-height: none !important;
    border-radius: 0 !important; padding: 0 !important; background: white !important;
    box-shadow: none !important;
}
body.view-mode .phone::before { display: none !important; } /* Quitar Notch */
body.view-mode .screen { border-radius: 0 !important; }

/* Responsivo para el generador */
@media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    .container { margin: 10px; padding: 15px; }
}
</style>
</head>

<body>

<div class="header">
    <img src="tq-logo-2024.png" class="logo">
</div>

<div class="hero">
    <h1>Generador de vCard con QR</h1>
</div>

<div class="container">
    <div class="main-grid">
        <div id="formSection">
            <input type="file" id="foto" accept="image/*">
            <div class="form-grid" style="margin-top:10px;">
                <input id="nombre" placeholder="Nombre">
                <input id="apellidos" placeholder="Apellidos">
                <input id="empresa" placeholder="Empresa">
                <input id="cargo" placeholder="Cargo">
                <input id="telefono_ext" placeholder="Teléfono + Ext">
                <input id="telefono" placeholder="Teléfono fijo">
                <input id="celular" placeholder="Celular">
                <input id="correo" placeholder="Correo">
                <input id="direccion" placeholder="Dirección">
                <input id="web" placeholder="Web">
            </div>

            <div style="margin-top:20px; background: #f8f9fa; padding: 15px; border-radius: 10px;">
                <label style="font-size: 13px; font-weight: 500;">Personalizar QR:</label>
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <input type="color" id="colorQR" value="#1e66d0" style="width: 50px; height: 40px; cursor: pointer;">
                    <select id="estiloQR" style="flex: 1;">
                        <option value="rounded">Redondeado</option>
                        <option value="dots">Puntos</option>
                        <option value="square">Cuadrado</option>
                        <option value="extra-rounded">Extra redondeado</option>
                        <option value="classy">Elegante</option>
                        <option value="classy-rounded">Elegante redondeado</option>
                    </select>
                </div>
                <button id="btnQR" style="width:100%; margin-top: 15px; background: #0a3d91;">GENERAR QR DE MI TARJETA</button>
            </div>

            <div style="text-align:center; margin-top:20px;">
                <div id="qr"></div>
            </div>
        </div>

        <div class="phone-container" id="tarjetaFinal">
            <div class="phone">
                <div class="screen">
                    <div class="screen-content">
                        <div class="card-header">
                            <img id="cardFoto" src="" style="display:none;">
                            <h2 id="cardNombre">Nombre Apellido</h2>
                            <p id="cardCargo">Cargo</p>
                            <p id="cardEmpresa">Empresa</p>
                        </div>

                        <div class="card-body">
                            <p id="cardTelExt">📞 -</p>
                            <p id="cardTelefono">☎ -</p>
                            <p id="cardCelular">📱 -</p>
                            <p id="cardCorreo">✉ -</p>
                            <p id="cardDireccion">📍 -</p>
                            <p id="cardWeb">🌐 -</p>
                        </div>
                    </div>

                    <div class="contact-footer">
                        <a id="btnContacto" class="contact-btn">Agregar a contactos</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let qrCode;
const fieldIds = ["nombre","apellidos","empresa","cargo","telefono","celular","correo","telefono_ext","direccion","web"];

// Manejo de la foto
document.getElementById('foto').addEventListener("change", e => {
    const file = e.target.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = evt => {
            const img = document.getElementById('cardFoto');
            img.src = evt.target.result;
            img.style.display = "inline-block";
        };
        reader.readAsDataURL(file);
    }
});

// Actualización en tiempo real
fieldIds.forEach(id => {
    document.getElementById(id).addEventListener("input", actualizarVista);
});

function actualizarVista() {
    const val = (id) => document.getElementById(id).value;
    document.getElementById('cardNombre').innerText = (val('nombre') + " " + val('apellidos')).trim() || "Nombre Apellido";
    document.getElementById('cardCargo').innerText = val('cargo') || "Cargo";
    document.getElementById('cardEmpresa').innerText = val('empresa') || "Empresa";
    document.getElementById('cardTelefono').innerText = "☎ " + (val('telefono') || "-");
    document.getElementById('cardCelular').innerText = "📱 " + (val('celular') || "-");
    document.getElementById('cardCorreo').innerText = "✉ " + (val('correo') || "-");
    document.getElementById('cardTelExt').innerText = "📞 " + (val('telefono_ext') || "-");
    document.getElementById('cardDireccion').innerText = "📍 " + (val('direccion') || "-");
    document.getElementById('cardWeb').innerText = "🌐 " + (val('web') || "-");
    generarArchivoVCF();
}

function generarArchivoVCF() {
    const val = (id) => document.getElementById(id).value;
    let vcard = `BEGIN:VCARD
VERSION:3.0
N:${val('apellidos')};${val('nombre')}
FN:${val('nombre')} ${val('apellidos')}
ORG:${val('empresa')}
TITLE:${val('cargo')}
TEL;TYPE=WORK:${val('telefono_ext')}
TEL;TYPE=HOME:${val('telefono')}
TEL;TYPE=CELL:${val('celular')}
EMAIL:${val('correo')}
ADR:${val('direccion')}
URL:${val('web')}
END:VCARD`;

    const blob = new Blob([vcard], { type: "text/vcard" });
    const btn = document.getElementById('btnContacto');
    btn.href = URL.createObjectURL(blob);
    btn.download = (val('nombre') || "contacto") + ".vcf";
}

document.getElementById('btnQR').onclick = () => {
    const params = new URLSearchParams();
    fieldIds.forEach(id => {
        const value = document.getElementById(id).value;
        if(value) params.append(id, value);
    });

    const baseUrl = window.location.origin + window.location.pathname;
    const finalUrl = baseUrl + "?" + params.toString();

    document.getElementById('qr').innerHTML = "";
    qrCode = new QRCodeStyling({
        width: 250, height: 250, data: finalUrl,
        dotsOptions: { color: document.getElementById('colorQR').value, type: document.getElementById('estiloQR').value },
        backgroundOptions: { color: "#ffffff" }
    });
    qrCode.append(document.getElementById('qr'));
};

// Lógica de detección: ¿Es un escaneo?
window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('nombre') || urlParams.has('celular')) {
        document.body.classList.add('view-mode'); // Activa Pantalla Completa Limpia
        fieldIds.forEach(id => {
            if(urlParams.has(id)) document.getElementById(id).value = urlParams.get(id);
        });
        actualizarVista();
    }
};
</script>

</body>
</html>
